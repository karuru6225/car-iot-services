; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-devkitc-1-develop

[env:esp32-s3-devkitc-1-release]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions_two_ota.csv
board_build.filesystem = spiffs
build_src_filter = +<*> -<provision.cpp>; provision.cpp は provision 環境でのみビルド

lib_deps =
    vshymanskyy/TinyGSM@^0.12.0
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit ADS1X15@^2.6.2

extra_scripts = pre:extra_scripts.py

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17

build_unflags =
    -std=gnu++11

[env:esp32-s3-devkitc-1-develop]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions_two_ota.csv
board_build.filesystem = spiffs
build_src_filter = +<*> -<provision.cpp>; provision.cpp は provision 環境でのみビルド

lib_deps =
    vshymanskyy/TinyGSM@^0.12.0
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit ADS1X15@^2.6.2

extra_scripts = pre:extra_scripts.py

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -D DEBUG_MODE

build_unflags =
    -std=gnu++11

[env:provision]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions_two_ota.csv
board_build.filesystem = spiffs
build_src_filter = -<*> +<provision.cpp>
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
build_unflags =
    -std=gnu++11