<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header h1 { font-size: 1rem; font-weight: 600; }

    #api-key-input {
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #2a2a4a;
      color: #fff;
      width: 220px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 2px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      color: #333;
      border-bottom-left-radius: 2px;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
    }

    .msg.assistant.streaming::after {
      content: '▋';
      animation: blink .6s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      max-height: 120px;
    }

    #input:focus { border-color: #1a1a2e; }

    button[type=submit] {
      padding: 10px 20px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button[type=submit]:disabled {
      background: #999;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<header>
  <h1>Agent Chat</h1>
  <input id="api-key-input" type="password" placeholder="API キーを入力" />
</header>

<div id="messages"></div>

<form id="form">
  <textarea id="input" rows="1" placeholder="メッセージを入力（Shift+Enter で改行）"></textarea>
  <button type="submit">送信</button>
</form>

<script>
  // CloudFront 経由でアクセスするため、origin そのままを使う
  const API_BASE = window.location.origin;
  // ユーザー識別（試験用途なのでランダム生成してセッションストレージに保持）
  const USER_ID = sessionStorage.getItem('userId') ?? (() => {
    const id = crypto.randomUUID();
    sessionStorage.setItem('userId', id);
    return id;
  })();

  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('form');
  const inputEl = document.getElementById('input');
  const submitBtn = form.querySelector('button[type=submit]');
  const apiKeyInput = document.getElementById('api-key-input');

  // ローカルストレージに API キーを保存
  apiKeyInput.value = localStorage.getItem('apiKey') ?? '';
  apiKeyInput.addEventListener('change', () => {
    localStorage.setItem('apiKey', apiKeyInput.value);
  });

  function getApiKey() {
    return apiKeyInput.value.trim();
  }

  function appendMessage(role, text, streaming = false) {
    const div = document.createElement('div');
    div.className = `msg ${role}${streaming ? ' streaming' : ''}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // Shift+Enter で改行、Enter で送信
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = inputEl.value.trim();
    if (!message) return;

    const apiKey = getApiKey();
    if (!apiKey) {
      alert('API キーを入力してください');
      return;
    }

    inputEl.value = '';
    submitBtn.disabled = true;
    appendMessage('user', message);

    const assistantEl = appendMessage('assistant', '', true);

    try {
      const res = await fetch(`${API_BASE}/api/invoke`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({ message, userId: USER_ID }),
      });

      if (!res.ok) {
        assistantEl.textContent = `エラー: ${res.status} ${res.statusText}`;
        assistantEl.classList.remove('streaming');
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          assistantEl.textContent += data;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    } catch (err) {
      assistantEl.textContent = `通信エラー: ${err.message}`;
    } finally {
      assistantEl.classList.remove('streaming');
      submitBtn.disabled = false;
      inputEl.focus();
    }
  });
</script>

</body>
</html>
