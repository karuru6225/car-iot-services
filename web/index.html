<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>センサーデータ管理</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
    h1 { color: #4f8ef7; margin-bottom: 16px; font-size: 1.3em; }
    .card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    label { font-size: 0.8em; color: #888; display: block; margin-bottom: 4px; }
    input, select {
      background: #0f3460; color: #e0e0e0; border: 1px solid #3a5a8a;
      border-radius: 4px; padding: 6px 10px; font-size: 0.9em;
    }
    input:focus, select:focus { outline: none; border-color: #4f8ef7; }
    button {
      background: #4f8ef7; color: white; border: none;
      border-radius: 4px; padding: 7px 16px; cursor: pointer; font-size: 0.9em;
    }
    button:hover { background: #3a7de4; }
    button.danger { background: #c0392b; }
    button.danger:hover { background: #a93226; }
    button.secondary { background: #2a4a6a; }
    button.secondary:hover { background: #3a5a7a; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; }
    .chart-container { position: relative; height: 280px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
    th { background: #0f3460; padding: 8px 10px; text-align: left; color: #aac0e0; font-weight: normal; }
    td { padding: 7px 10px; border-bottom: 1px solid #1e2d4a; }
    tr:hover td { background: #1e2d4a; }
    tbody tr { cursor: pointer; }
    tbody.no-select { user-select: none; }
    tbody tr.row-selected td { background: #1a3a60; }
    tbody tr.row-selected:hover td { background: #1e4070; }
    .status { color: #888; font-size: 0.85em; }
    .tag-battery { color: #4f8ef7; }
    .tag-thermometer { color: #4fc87f; }
    .tag-co2meter { color: #f7d24f; }
    a.settings-toggle { color: #888; font-size: 0.8em; cursor: pointer; text-decoration: underline; }
    #empty-msg { text-align: center; color: #555; padding: 24px; font-size: 0.9em; }
    .label-item { display:flex; align-items:center; gap:10px; padding:5px 0; border-bottom:1px solid #1e2d4a; font-size:0.85em; }
    .label-item .label-key { color:#888; }
    .label-item .label-arrow { color:#4f8ef7; }
    .label-item .label-name { color:#e0e0e0; flex:1; }
    .section-title { font-size:0.9em; color:#aac0e0; cursor:pointer; user-select:none; }
    .section-title:hover { color:#e0e0e0; }
  </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
  <h1 style="margin-bottom:0">センサーデータ管理</h1>
  <button class="secondary" onclick="logout()" style="font-size:0.8em">ログアウト</button>
</div>

<!-- ラベル設定 -->
<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
    <span class="section-title" onclick="toggleLabels()">▶ ラベル設定（addr / id に表示名を付ける）</span>
  </div>
  <div id="label-section" style="display:none">
    <div class="form-row" style="margin-bottom:10px">
      <div class="form-group">
        <label>addr (XX:XX:XX:XX:XX:XX) または id (voltage_1)</label>
        <input type="text" id="label-key" placeholder="AA:BB:CC:DD:EE:FF" style="width:240px">
      </div>
      <div class="form-group">
        <label>表示名</label>
        <input type="text" id="label-name" placeholder="リビング温湿度計" style="width:180px">
      </div>
      <button onclick="addLabel()">追加</button>
    </div>
    <div id="label-list"></div>
  </div>
</div>

<!-- 検索フォーム -->
<div class="card">
  <div class="form-row">
    <div class="form-group">
      <label>タイプ</label>
      <select id="type">
        <option value="">全て</option>
        <option value="battery">電圧</option>
        <option value="thermometer">温湿度</option>
        <option value="co2meter">CO2</option>
      </select>
    </div>
    <div class="form-group">
      <label>addr (XX:XX:XX:XX:XX:XX) または id (voltage_1)</label>
      <input type="text" id="filter" placeholder="省略可" style="width:220px">
    </div>
    <div class="form-group">
      <label>期間</label>
      <select id="hours">
        <option value="24">24時間</option>
        <option value="48">48時間</option>
        <option value="72">72時間</option>
        <option value="168">1週間</option>
      </select>
    </div>
    <button onclick="search()">検索</button>
    <span class="status" id="search-status"></span>
  </div>
</div>

<!-- グラフ（電圧） -->
<div class="card" id="chart-voltage-card" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
    <span class="section-title" onclick="toggleChart('voltage')">▼ 電圧グラフ</span>
  </div>
  <div id="chart-voltage-section">
    <div class="chart-container">
      <canvas id="chart-voltage"></canvas>
    </div>
  </div>
</div>

<!-- グラフ（温度） -->
<div class="card" id="chart-temp-card" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
    <span class="section-title" onclick="toggleChart('temp')">▼ 温度グラフ</span>
  </div>
  <div id="chart-temp-section">
    <div class="chart-container">
      <canvas id="chart-temp"></canvas>
    </div>
  </div>
</div>

<!-- グラフ（湿度） -->
<div class="card" id="chart-humidity-card" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
    <span class="section-title" onclick="toggleChart('humidity')">▼ 湿度グラフ</span>
  </div>
  <div id="chart-humidity-section">
    <div class="chart-container">
      <canvas id="chart-humidity"></canvas>
    </div>
  </div>
</div>

<!-- グラフ（CO2） -->
<div class="card" id="chart-co2-card" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
    <span class="section-title" onclick="toggleChart('co2')">▼ CO2グラフ</span>
  </div>
  <div id="chart-co2-section">
    <div class="chart-container">
      <canvas id="chart-co2"></canvas>
    </div>
  </div>
</div>

<!-- テーブル -->
<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
    <span class="status" id="count"></span>
    <div style="display:flex; gap:8px; align-items:center">
      <span id="selection-count" style="font-size:0.85em; color:#4f8ef7; display:none"></span>
      <button class="danger" id="btn-delete-selected" style="display:none" onclick="deleteSelected()">選択削除</button>
    </div>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>タイムスタンプ (JST)</th>
          <th>デバイス</th>
          <th>タイプ</th>
          <th>addr / id</th>
          <th>値</th>
          <th id="th-delete"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-msg" style="display:none">データなし</div>
  </div>
</div>

<script>
// ─── 設定（Terraform デプロイ時に埋め込まれる） ──────────────────────────────
const API_BASE          = '__TMPL_API_ENDPOINT__';
const COGNITO_DOMAIN    = '__TMPL_COGNITO_DOMAIN__';
const COGNITO_CLIENT_ID = '__TMPL_COGNITO_CLIENT_ID__';
const WEB_URL           = '__TMPL_WEB_URL__';

// ─── 状態 ────────────────────────────────────────────────────────────────────
let idToken    = sessionStorage.getItem('id_token') || '';
let userGroups = JSON.parse(sessionStorage.getItem('user_groups') || '[]');

function parseJwtPayload(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
  } catch { return {}; }
}

function isAdmin() { return userGroups.includes('admin'); }
let labels  = JSON.parse(localStorage.getItem('labels') || '{}');
let chartVoltage          = null;
let chartTemp             = null;
let chartHumidity         = null;
let chartCo2              = null;
let crosshairTimestamp    = null;
let crosshairAbortCtrl    = null;
let rows           = [];
let selectedIndices = new Set();
let lastClickedIdx  = -1;

const COLORS = ['#4f8ef7', '#f79f4f', '#4fc87f', '#e74c3c', '#af4ff7', '#4fd4f7'];

// ─── 初期化・認証 ─────────────────────────────────────────────────────────────
window.onload = () => {
  // URL fragment に id_token があればセッションに保存（Cognito からのリダイレクト）
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const tokenFromHash = hash.get('id_token');
  if (tokenFromHash) {
    idToken = tokenFromHash;
    sessionStorage.setItem('id_token', idToken);
    const payload = parseJwtPayload(idToken);
    userGroups = payload['cognito:groups'] || [];
    sessionStorage.setItem('user_groups', JSON.stringify(userGroups));
    // URL から fragment を除去
    history.replaceState(null, '', window.location.pathname);
  }

  // 未ログインなら Cognito Hosted UI へリダイレクト
  if (!idToken) {
    redirectToLogin();
    return;
  }

  // admin 以外は削除列ヘッダーを非表示
  if (!isAdmin()) {
    document.getElementById('th-delete').style.display = 'none';
  }

  renderLabelList();

  // Shift 押下中はテーブルのテキスト選択を無効化
  const setNoSelect = on => document.getElementById('tbody').classList.toggle('no-select', on);
  document.addEventListener('keydown', e => { if (e.key === 'Shift') setNoSelect(true);  });
  document.addEventListener('keyup',   e => { if (e.key === 'Shift') setNoSelect(false); });
};

function redirectToLogin() {
  const params = new URLSearchParams({
    client_id:     COGNITO_CLIENT_ID,
    response_type: 'token',
    scope:         'openid email profile',
    redirect_uri:  WEB_URL,
  });
  window.location.href = `${COGNITO_DOMAIN}/login?${params}`;
}

function logout() {
  sessionStorage.removeItem('id_token');
  idToken = '';
  const params = new URLSearchParams({
    client_id:  COGNITO_CLIENT_ID,
    logout_uri: WEB_URL,
  });
  window.location.href = `${COGNITO_DOMAIN}/logout?${params}`;
}

// ─── ラベル管理 ──────────────────────────────────────────────────────────────
function getLabel(key) {
  return labels[key] || key;
}

function toggleLabels() {
  const sec = document.getElementById('label-section');
  const title = document.querySelector('.section-title');
  const open = sec.style.display === 'none';
  sec.style.display = open ? '' : 'none';
  title.textContent = (open ? '▼' : '▶') + ' ラベル設定（addr / id に表示名を付ける）';
}

function addLabel() {
  const key  = document.getElementById('label-key').value.trim();
  const name = document.getElementById('label-name').value.trim();
  if (!key || !name) return;
  labels[key] = name;
  localStorage.setItem('labels', JSON.stringify(labels));
  document.getElementById('label-key').value  = '';
  document.getElementById('label-name').value = '';
  renderLabelList();
  // 既に表示中のデータがあれば再描画
  if (rows.length) { renderTable(rows); renderChart(rows); }
}

function removeLabel(key) {
  delete labels[key];
  localStorage.setItem('labels', JSON.stringify(labels));
  renderLabelList();
  if (rows.length) { renderTable(rows); renderChart(rows); }
}

function renderLabelList() {
  const container = document.getElementById('label-list');
  const entries = Object.entries(labels);
  if (!entries.length) {
    container.innerHTML = '<span style="color:#555; font-size:0.85em">登録なし</span>';
    return;
  }
  container.innerHTML = entries.map(([k, v]) => `
    <div class="label-item">
      <span class="label-key">${k}</span>
      <span class="label-arrow">→</span>
      <span class="label-name">${v}</span>
      <button class="danger" style="padding:2px 8px; font-size:0.78em"
        onclick="removeLabel('${k.replace(/'/g, "\\'")}')">削除</button>
    </div>
  `).join('');
}

// ─── API 呼び出し ─────────────────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: { 'Authorization': `Bearer ${idToken}`, ...(options.headers || {}) },
  });
  if (res.status === 401) {
    // トークン期限切れ → 再ログイン
    sessionStorage.removeItem('id_token');
    sessionStorage.removeItem('user_groups');
    redirectToLogin();
    throw new Error('Unauthorized');
  }
  if (res.status === 403) {
    throw new Error('Forbidden');
  }
  return res;
}

// ─── 検索（非同期ポーリング方式） ────────────────────────────────────────────
async function search() {
  const type   = document.getElementById('type').value;
  const filter = document.getElementById('filter').value.trim();
  const hours  = document.getElementById('hours').value;

  const params = new URLSearchParams({ hours });
  if (type)   params.set('type', type);
  if (filter) {
    if (filter.includes(':')) params.set('addr', filter);
    else                      params.set('id',   filter);
  }

  try {
    // 1. クエリ投入 → execution_id を受け取る
    setStatus('search', 'クエリ投入中...');
    const res  = await apiFetch('/data?' + params);
    const json = await res.json();

    if (json.error) { setStatus('search', `エラー: ${json.error}`); return; }

    const eid = json.execution_id;
    if (!eid) { setStatus('search', 'execution_id が返りませんでした'); return; }

    // 2. 完了までポーリング（2秒間隔、最大60秒）
    let elapsed = 0;
    while (elapsed < 60000) {
      await new Promise(r => setTimeout(r, 2000));
      elapsed += 2000;
      setStatus('search', `集計中... (${elapsed / 1000}s)`);

      const pollRes  = await apiFetch(`/data?execution_id=${eid}`);
      const pollJson = await pollRes.json();

      if (pollJson.status === 'SUCCEEDED') {
        rows = pollJson.data || [];
        renderChart(rows);
        renderTable(rows);
        document.getElementById('count').textContent = `${rows.length} 件`;
        setStatus('search', `${rows.length} 件取得`);
        return;
      }
      if (pollJson.status === 'FAILED' || pollJson.status === 'CANCELLED') {
        setStatus('search', `クエリ失敗: ${pollJson.error || pollJson.status}`);
        return;
      }
      // RUNNING / QUEUED → 継続
    }
    setStatus('search', 'タイムアウト（60s）');
  } catch (e) {
    if (e.message !== 'Unauthorized') {
      setStatus('search', `エラー: ${e.message}`);
    }
  }
}

// ─── グラフ ───────────────────────────────────────────────────────────────────

// 縦線プラグイン（全チャート共通）
Chart.register({
  id: 'crosshair',
  afterDraw(chart) {
    if (crosshairTimestamp == null || !chart.scales.x || !chart.scales.y) return;
    const x = chart.scales.x.getPixelForValue(crosshairTimestamp);
    if (x < chart.scales.x.left || x > chart.scales.x.right) return;
    const ctx = chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x, chart.scales.y.top);
    ctx.lineTo(x, chart.scales.y.bottom);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.restore();
  },
});

function getActiveCharts() {
  return [chartVoltage, chartTemp, chartHumidity, chartCo2].filter(Boolean);
}

function setupCrosshairSync() {
  if (crosshairAbortCtrl) crosshairAbortCtrl.abort();
  crosshairAbortCtrl = new AbortController();
  const { signal } = crosshairAbortCtrl;

  getActiveCharts().forEach(src => {
    src.canvas.addEventListener('mousemove', (e) => {
      const rect = src.canvas.getBoundingClientRect();
      crosshairTimestamp = src.scales.x.getValueForPixel(e.clientX - rect.left);

      getActiveCharts().forEach(c => {
        if (c === src) return;
        const px = c.scales.x.getPixelForValue(crosshairTimestamp);
        const elements = [];
        c.data.datasets.forEach((_, di) => {
          const meta = c.getDatasetMeta(di);
          if (meta.hidden || !meta.data.length) return;
          let nearestIdx = 0, minDist = Infinity;
          meta.data.forEach((el, i) => {
            const d = Math.abs(el.x - px);
            if (d < minDist) { minDist = d; nearestIdx = i; }
          });
          elements.push({ datasetIndex: di, index: nearestIdx });
        });
        c.tooltip.setActiveElements(elements, { x: px, y: c.scales.y.top });
        c.update('none');
      });
    }, { signal });

    src.canvas.addEventListener('mouseleave', () => {
      crosshairTimestamp = null;
      getActiveCharts().forEach(c => {
        if (c === src) return;
        c.tooltip.setActiveElements([], {});
        c.update('none');
      });
    }, { signal });
  });
}

const CHART_LABELS = { voltage: '電圧グラフ', temp: '温度グラフ', humidity: '湿度グラフ', co2: 'CO2グラフ' };

function toggleChart(type) {
  const section = document.getElementById(`chart-${type}-section`);
  const title   = document.querySelector(`#chart-${type}-card .section-title`);
  const open    = section.style.display !== 'none';
  section.style.display = open ? 'none' : '';
  title.textContent = (open ? '▶' : '▼') + ' ' + CHART_LABELS[type];
}

function makeChartOptions(scales) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    scales,
    plugins: {
      legend: { labels: { color: '#e0e0e0', boxWidth: 20, padding: 12 } },
    },
  };
}

const timeScale = {
  type: 'time',
  time: {
    tooltipFormat: 'yyyy/MM/dd HH:mm',
    displayFormats: { hour: 'MM/dd HH:mm', minute: 'HH:mm' },
  },
  ticks: { color: '#888' },
  grid:  { color: '#1e2d4a' },
};

function renderChart(data) {
  if (chartVoltage)  { chartVoltage.destroy();  chartVoltage  = null; }
  if (chartTemp)     { chartTemp.destroy();      chartTemp     = null; }
  if (chartHumidity) { chartHumidity.destroy();  chartHumidity = null; }
  if (chartCo2)      { chartCo2.destroy();       chartCo2      = null; }

  const voltageRows   = data.filter(r => r.type === 'battery');
  const switchbotRows = data.filter(r => r.type === 'thermometer' || r.type === 'co2meter');
  const co2Rows       = data.filter(r => r.type === 'co2meter');

  const linearScale = (pos) => ({
    type: 'linear', position: pos,
    ticks: { color: '#888' },
    grid: pos === 'left' ? { color: '#1e2d4a' } : { drawOnChartArea: false },
  });

  // 電圧グラフ
  const vCard = document.getElementById('chart-voltage-card');
  if (voltageRows.length) {
    vCard.style.display = '';
    let colorIdx = 0;
    const vDatasets = [];
    Object.entries(groupBy(voltageRows, 'device_id')).forEach(([did, pts]) => {
      const color = COLORS[colorIdx++ % COLORS.length];
      const idKey = pts[0]?.id || did;
      vDatasets.push({
        label: `${getLabel(idKey)} 電圧(V)`,
        data: pts.map(r => ({ x: new Date(r.ts), y: r.voltage })),
        borderColor: color, backgroundColor: 'transparent', tension: 0.2, pointRadius: 0,
      });
    });
    chartVoltage = new Chart(
      document.getElementById('chart-voltage').getContext('2d'),
      { type: 'line', data: { datasets: vDatasets }, options: makeChartOptions({ x: timeScale, y: linearScale('left') }) }
    );
  } else {
    vCard.style.display = 'none';
  }

  // 温度グラフ
  const tCard = document.getElementById('chart-temp-card');
  if (switchbotRows.length) {
    tCard.style.display = '';
    let colorIdx = 0;
    const tDatasets = [];
    Object.entries(groupBy(switchbotRows, 'addr')).forEach(([addr, pts]) => {
      const color = COLORS[colorIdx++ % COLORS.length];
      tDatasets.push({
        label: `${getLabel(addr)} 温度(°C)`,
        data: pts.map(r => ({ x: new Date(r.ts), y: r.temp })),
        borderColor: color, backgroundColor: 'transparent', tension: 0.2, pointRadius: 0,
      });
    });
    chartTemp = new Chart(
      document.getElementById('chart-temp').getContext('2d'),
      { type: 'line', data: { datasets: tDatasets }, options: makeChartOptions({ x: timeScale, y: linearScale('left') }) }
    );
  } else {
    tCard.style.display = 'none';
  }

  // 湿度グラフ
  const hCard = document.getElementById('chart-humidity-card');
  if (switchbotRows.length) {
    hCard.style.display = '';
    let colorIdx = 0;
    const hDatasets = [];
    Object.entries(groupBy(switchbotRows, 'addr')).forEach(([addr, pts]) => {
      const color = COLORS[colorIdx++ % COLORS.length];
      hDatasets.push({
        label: `${getLabel(addr)} 湿度(%)`,
        data: pts.map(r => ({ x: new Date(r.ts), y: r.humidity })),
        borderColor: color, backgroundColor: 'transparent', tension: 0.2, pointRadius: 0,
      });
    });
    chartHumidity = new Chart(
      document.getElementById('chart-humidity').getContext('2d'),
      { type: 'line', data: { datasets: hDatasets }, options: makeChartOptions({ x: timeScale, y: linearScale('left') }) }
    );
  } else {
    hCard.style.display = 'none';
  }

  // CO2グラフ
  const co2Card = document.getElementById('chart-co2-card');
  if (co2Rows.length) {
    co2Card.style.display = '';
    let colorIdx = 0;
    const co2Datasets = [];
    Object.entries(groupBy(co2Rows, 'addr')).forEach(([addr, pts]) => {
      const color = COLORS[colorIdx++ % COLORS.length];
      co2Datasets.push({
        label: `${getLabel(addr)} CO2(ppm)`,
        data: pts.map(r => ({ x: new Date(r.ts), y: r.co2 })),
        borderColor: color, backgroundColor: 'transparent', tension: 0.2, pointRadius: 0,
      });
    });
    chartCo2 = new Chart(
      document.getElementById('chart-co2').getContext('2d'),
      { type: 'line', data: { datasets: co2Datasets }, options: makeChartOptions({ x: timeScale, y: linearScale('left') }) }
    );
  } else {
    co2Card.style.display = 'none';
  }

  setupCrosshairSync();
}

// ─── テーブル ─────────────────────────────────────────────────────────────────
function renderTable(data) {
  const tbody    = document.getElementById('tbody');
  const emptyMsg = document.getElementById('empty-msg');
  tbody.innerHTML = '';
  selectedIndices.clear();
  lastClickedIdx = -1;
  updateSelectionUI();

  if (!data.length) {
    emptyMsg.style.display = '';
    return;
  }
  emptyMsg.style.display = 'none';

  data.forEach((r, idx) => {
    const isBattery     = r.type === 'battery';
    const isThermometer = r.type === 'thermometer';
    const isCo2         = r.type === 'co2meter';
    const typeLabel = isBattery
      ? '<span class="tag-battery">電圧</span>'
      : isCo2
        ? '<span class="tag-co2meter">CO2</span>'
        : '<span class="tag-thermometer">温湿度</span>';
    const rawKey  = r.addr || r.id || '-';
    const dispKey = rawKey !== '-' ? getLabel(rawKey) : '-';
    const addrCell = (dispKey !== rawKey)
      ? `${dispKey} <span style="color:#555; font-size:0.8em">(${rawKey})</span>`
      : rawKey;
    let valueStr = '-';
    if (isBattery)     valueStr = `${r.voltage?.toFixed(2)} V`;
    if (isThermometer) valueStr = `${r.temp?.toFixed(1)}°C / ${r.humidity}% / BAT:${r.battery}% / RSSI:${r.rssi}`;
    if (isCo2)         valueStr = `${r.co2} ppm / ${r.temp?.toFixed(1)}°C / ${r.humidity}% / BAT:${r.battery}%`;

    const hours    = document.getElementById('hours').value;

    const tr = document.createElement('tr');
    tr.dataset.index = idx;
    tr.innerHTML = `
      <td>${toJST(r.ts)}</td>
      <td>${r.device_id || '-'}</td>
      <td>${typeLabel}</td>
      <td>${addrCell}</td>
      <td>${valueStr}</td>
      <td>${isAdmin() ? `<button class="danger" style="padding:4px 10px; font-size:0.8em" onclick="deleteOne(${idx})">削除</button>` : ''}</td>
    `;
    tr.addEventListener('click', e => handleRowClick(e, idx));
    tbody.appendChild(tr);
  });
}

// ─── 行選択 ───────────────────────────────────────────────────────────────────
function handleRowClick(e, index) {
  if (e.target.tagName === 'BUTTON') return;

  if (e.shiftKey && lastClickedIdx >= 0) {
    const from = Math.min(lastClickedIdx, index);
    const to   = Math.max(lastClickedIdx, index);
    for (let i = from; i <= to; i++) selectedIndices.add(i);
  } else if (e.ctrlKey || e.metaKey) {
    if (selectedIndices.has(index)) selectedIndices.delete(index);
    else selectedIndices.add(index);
    lastClickedIdx = index;
  } else {
    // 単一クリック: 既にその1行だけ選択中ならクリアし直す
    if (selectedIndices.size === 1 && selectedIndices.has(index)) {
      selectedIndices.clear();
    } else {
      selectedIndices.clear();
      selectedIndices.add(index);
    }
    lastClickedIdx = index;
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  const n = selectedIndices.size;
  document.querySelectorAll('#tbody tr').forEach(tr => {
    tr.classList.toggle('row-selected', selectedIndices.has(Number(tr.dataset.index)));
  });
  const selCount = document.getElementById('selection-count');
  const btnSel   = document.getElementById('btn-delete-selected');
  if (n > 0) {
    selCount.textContent = `${n} 行選択中`;
    selCount.style.display = '';
    if (isAdmin()) {
      btnSel.textContent = `選択した ${n} 件を削除`;
      btnSel.style.display = '';
    }
  } else {
    selCount.style.display = 'none';
    btnSel.style.display   = 'none';
  }
}

// ─── 削除 ────────────────────────────────────────────────────────────────────
async function deleteOne(idx) {
  const r = rows[idx];
  const label = getLabel(r.addr || r.id || '-');
  if (!confirm(`"${label}" (${toJST(r.ts)}) を削除しますか？`)) return;
  await doDeleteByKeys([r.s3_key]);
}


async function deleteSelected() {
  if (!selectedIndices.size) return;
  const s3Keys = [...selectedIndices].map(i => rows[i].s3_key).filter(Boolean);
  if (!s3Keys.length) return;
  if (!confirm(`選択した ${s3Keys.length} 件を削除しますか？`)) return;
  await doDeleteByKeys(s3Keys);
  selectedIndices.clear();
  updateSelectionUI();
}

async function doDeleteByKeys(s3Keys) {
  setStatus('search', '削除中...');
  try {
    const res  = await apiFetch('/data', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ s3_keys: s3Keys }),
    });
    const json = await res.json();
    setStatus('search', `${json.deleted} 件削除しました`);
    await search(); // 再検索
  } catch (e) {
    if (e.message === 'Forbidden') {
      setStatus('search', '削除権限がありません（admin グループが必要です）');
    } else if (e.message !== 'Unauthorized') {
      setStatus('search', `削除エラー: ${e.message}`);
    }
  }
}

// ─── ユーティリティ ───────────────────────────────────────────────────────────
function toJST(ts) {
  if (!ts) return '-';
  return new Date(ts).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
}

function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const k = item[key] || 'unknown';
    if (!acc[k]) acc[k] = [];
    acc[k].push(item);
    return acc;
  }, {});
}

function setStatus(area, msg) {
  document.getElementById(area === 'search' ? 'search-status' : 'settings-status').textContent = msg;
}
</script>
